[bumpversion]
current_version = 1.0.0
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(\.(?P<build>\w+))?
serialize = 
	{major}.{minor}.{patch}.{build}
	{major}.{minor}.{patch}

[flake8]
ignore = E266, E203, E501, W291  

[isort]
known_third_party = 
	pytest

[bumpversion:file:scratch_proj/repo_version_fake.txt]
search = version=={current_version}
replace = version=={new_version}
